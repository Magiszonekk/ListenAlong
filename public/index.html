<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify → YouTube Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }
    h1 { font-size: 1.4rem; color: #1db954; }
    #listeners { font-size: 0.75rem; color: #555; margin-top: 4px; text-align: center; }
    #client-id { font-size: 0.7rem; color: #333; margin-top: 2px; text-align: center; font-family: monospace; }
    #status { font-size: 0.9rem; color: #aaa; text-align: center; }
    #track-info { text-align: center; }
    #track-name { font-size: 1.2rem; font-weight: bold; }
    #artist-name { font-size: 0.95rem; color: #aaa; margin-top: 4px; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-left: 8px;
      vertical-align: middle;
    }
    .badge-playing { background: #1db954; color: #000; }
    .badge-paused  { background: #555;    color: #fff; }
    #audio-player {
      width: 100%;
      max-width: 500px;
      accent-color: #1db954;
    }
    #login-prompt {
      display: none;
      font-size: 1rem;
    }
    #login-prompt a { color: #1db954; text-decoration: none; font-weight: bold; }
    #start-btn {
      background: #1db954;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    #start-btn:hover { background: #17a349; }
  </style>
</head>
<body>
  <h1>Spotify → YouTube Sync</h1>
  <div id="listeners"></div>
  <div id="client-id"></div>

  <div id="login-prompt">
    Not connected. <a href="/auth/login">Log in with Spotify</a>
  </div>

  <div id="track-info">
    <div id="track-name">—</div>
    <div id="artist-name">—</div>
  </div>

  <div id="status">Kliknij Start aby zsynchronizować.</div>

  <button id="start-btn">▶ Start sync</button>

  <audio id="audio-player" controls></audio>

  <script>
    const audio = document.getElementById('audio-player');
    const startBtn = document.getElementById('start-btn');

    // Unique ID per tab, persisted in sessionStorage
    let clientId = sessionStorage.getItem('clientId');
    if (!clientId) {
      clientId = crypto.randomUUID();
      sessionStorage.setItem('clientId', clientId);
    }
    const clientShort = clientId.slice(0, 6);

    // Wrap fetch to always send X-Client-Id for same-origin requests
    const _fetch = window.fetch.bind(window);
    window.fetch = (url, opts = {}) => {
      if (typeof url === 'string' && url.startsWith('/')) {
        opts = { ...opts, headers: { 'X-Client-Id': clientId, ...(opts.headers || {}) } };
      }
      return _fetch(url, opts);
    };

    document.getElementById('client-id').textContent = `ID: ${clientShort}`;

    function log(msg) {
      const tagged = `[${clientShort}] ${msg}`;
      console.log(tagged);
      fetch('/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg: tagged }),
      }).catch(() => {});
    }

    let currentTrackId = null;
    let currentVideoId = null;

    // Prefetch state
    let prefetchTrackId = null;   // Spotify ID of prefetched next track
    let prefetchVideoId = null;   // YouTube videoId for next track
    let prefetchAudio = new Audio();
    let prefetchReady = false;

    prefetchAudio.preload = 'auto';

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function setTrackInfo(track, artist, isPlaying) {
      document.getElementById('track-name').innerHTML =
        `${track} <span class="badge ${isPlaying ? 'badge-playing' : 'badge-paused'}">${isPlaying ? '▶ Playing' : '⏸ Paused'}</span>`;
      document.getElementById('artist-name').textContent = artist;
    }

    async function updateListeners() {
      try {
        const res = await fetch('/clients');
        const data = await res.json();
        const el = document.getElementById('listeners');
        el.textContent = data.count === 1 ? '1 listener' : `${data.count} listeners`;
      } catch (_) {}
    }

    // Prefetch next track: search YouTube + warm backend cache + buffer audio
    async function prefetchNext(next) {
      if (!next || prefetchTrackId === next.track_id) return;
      log(`[debug] prefetchNext: ${next.track} (${next.track_id})`);
      prefetchTrackId = next.track_id;
      prefetchVideoId = null;
      prefetchReady = false;

      try {
        const res = await fetch(
          `/youtube/search?track=${encodeURIComponent(next.track)}&artist=${encodeURIComponent(next.artist)}&duration_ms=${next.duration_ms}&track_id=${encodeURIComponent(next.track_id)}`
        );
        const data = await res.json();
        if (!data.videoId) {
          log(`[debug] prefetchNext: no match for ${next.track}`);
          return;
        }

        prefetchVideoId = data.videoId;
        // Warm backend cache (fire-and-forget)
        fetch(`/youtube/prefetch/${prefetchVideoId}`);
        // Buffer audio in background element — attach once listener BEFORE setting src
        prefetchAudio.addEventListener('canplay', () => { prefetchReady = true; }, { once: true });
        prefetchAudio.src = `/youtube/audio/${prefetchVideoId}`;
        prefetchAudio.load();
        log(`[prefetch] buffering next: ${next.track} → ${prefetchVideoId}`);
      } catch (_) {}
    }

    async function loadTrack(data, spotifySec) {
      log(`[debug] loadTrack called for: ${data.track} (${data.track_id}), prefetchTrackId=${prefetchTrackId}, prefetchVideoId=${prefetchVideoId}`);

      // Check if we prefetched this exact track
      if (prefetchVideoId && prefetchTrackId === data.track_id) {
        log(`[debug] prefetch hit, prefetchReady=${prefetchReady}`);
        currentVideoId = prefetchVideoId;

        if (prefetchReady) {
          // Already buffered — swap instantly
          audio.src = prefetchAudio.src;
          audio.currentTime = spotifySec;
          audio.play().catch(() => {});
          setStatus('In sync.');
        } else {
          // Still loading — wait for canplay, keep old audio playing
          setStatus('Buffering...');
          prefetchAudio.addEventListener('canplay', () => {
            log(`[debug] prefetchAudio canplay fired, swapping to ${prefetchVideoId}`);
            audio.src = prefetchAudio.src;
            audio.currentTime = spotifySec;
            audio.play().catch(() => {});
            setStatus('In sync.');
          }, { once: true });
        }
        return;
      }

      // No prefetch — load normally (old audio keeps playing until new one is ready)
      log(`[debug] no prefetch, searching YouTube for: ${data.track} – ${data.artist}`);
      setStatus(`Searching for: ${data.track} – ${data.artist}...`);
      let ytData;
      try {
        const res = await fetch(
          `/youtube/search?track=${encodeURIComponent(data.track)}&artist=${encodeURIComponent(data.artist)}&duration_ms=${data.duration_ms}&track_id=${encodeURIComponent(data.track_id)}`
        );
        ytData = await res.json();
      } catch (err) {
        setStatus('Search error: ' + err.message);
        return;
      }

      if (!ytData.videoId) {
        log(`[debug] no YouTube match for: ${data.track} – ${data.artist}`);
        setStatus('No matching track found on YouTube.');
        currentVideoId = null;
        audio.pause();
        audio.src = '';
        return;
      }

      currentVideoId = ytData.videoId;
      log(`[debug] found videoId=${currentVideoId}, loading audio...`);
      setStatus('Loading audio...');

      const newAudio = new Audio(`/youtube/audio/${currentVideoId}`);
      newAudio.preload = 'auto';
      newAudio.addEventListener('canplay', () => {
        log(`[debug] canplay fired for ${currentVideoId}, swapping audio`);
        audio.src = newAudio.src;
        audio.currentTime = spotifySec;
        audio.play().catch((err) => {
          log(`[error] play() rejected: ${err.message}`);
          setStatus('Playback error: ' + err.message);
        });
        setStatus('In sync.');
      }, { once: true });
      newAudio.addEventListener('error', () => {
        const e = newAudio.error;
        log(`[error] newAudio failed for ${currentVideoId}: code=${e ? e.code : '?'} message=${e ? e.message : '?'}`);
        setStatus('Audio load error — retrying...');
        currentVideoId = null;
        currentTrackId = null; // next poll() will reload the track
      }, { once: true });
      newAudio.load();
    }

    let pollCount = 0;

    async function pollQueue() {
      try {
        const res = await fetch('/spotify/queue');
        const data = await res.json();
        prefetchNext(data.next);
      } catch (_) {}
    }

    async function poll() {
      let data;
      try {
        const res = await fetch('/spotify/now-playing');
        if (res.status === 401) {
          document.getElementById('login-prompt').style.display = 'block';
          setStatus('Not authenticated — please log in.');
          return;
        }
        data = await res.json();
      } catch (err) {
        setStatus('Network error: ' + err.message);
        return;
      }

      document.getElementById('login-prompt').style.display = 'none';

      if (!data.is_playing) {
        setStatus('Spotify is paused or nothing is playing.');
        audio.pause();
        return;
      }

      setTrackInfo(data.track, data.artist, data.is_playing);
      const spotifySec = data.progress_ms / 1000;

      if (data.track_id !== currentTrackId) {
        log(`\n--- ${data.track} – ${data.artist} ---`);
        log(`[debug] track changed: ${currentTrackId} → ${data.track_id} (${data.track})`);
        currentTrackId = data.track_id;
        await loadTrack(data, spotifySec);
        pollQueue();

      } else if (currentVideoId) {
        // Check queue every 3rd poll (~9s) to update prefetch if queue changed
        if (++pollCount % 3 === 0) pollQueue();
        // Same track — correct drift
        const drift = Math.abs(audio.currentTime - spotifySec);
        if (drift > 2) {
          setStatus(`Correcting drift (${drift.toFixed(1)}s)...`);
          audio.currentTime = spotifySec;
        } else {
          setStatus('In sync.');
        }
        if (audio.paused) audio.play().catch(() => {});
      }
    }

    startBtn.addEventListener('click', () => {
      startBtn.style.display = 'none';
      poll();
      setInterval(poll, 3000);
      updateListeners();
      setInterval(updateListeners, 5000);
    });
  </script>
</body>
</html>
